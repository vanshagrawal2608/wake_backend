# XcodeGen spec — run `xcodegen generate` in this folder to produce Wake.xcodeproj
name: Wake
options:
  bundleIdPrefix: com.wake
  deploymentTarget:
    iOS: "17.0"      # AlarmKit paths are gated to iOS 26 at runtime; base app runs on 17+
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""            # <- set your Apple Team ID in Xcode signing (free personal team is fine)
    CODE_SIGN_STYLE: Automatic
targets:
  Wake:
    type: application
    platform: iOS
    sources:
      - Wake
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wake.app
    # Generated Info.plist — free personal signing friendly (no paid-only entitlements).
    info:
      path: Wake/Info.plist
      properties:
        UIUserInterfaceStyle: Dark            # Wake commits to the night world
        UIBackgroundModes: [audio]            # legitimately plays the wake soundscape
        NSHealthShareUsageDescription: "Wake reads your sleep data to learn how long you take to wake up."
        NSMotionUsageDescription: "Wake reads your motion history to estimate when you fell asleep."
        NSMicrophoneUsageDescription: "Wake listens for “I’m awake” to decide whether to stop the alarm."
        NSSpeechRecognitionUsageDescription: "Wake recognises your voice on-device to confirm you’re awake."
        UILaunchScreen: {}
# Note: Critical Alerts + AlarmKit + Time-Sensitive notifications need a paid
# developer account / entitlement request. On free personal signing the app uses
# the standard local-notification ladder (see AlarmScheduling.swift), which needs
# no special entitlement.
